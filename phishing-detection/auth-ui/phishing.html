        <div id="emailSection" class="hidden" style="margin-top: 20px;">
            <h3>Email & SMS Analysis</h3>
            <textarea id="phishText" rows="6" placeholder="Paste the suspicious SMS or Email text here..."></textarea>
            <button class="btn-analyze" style="width: 100%; margin-top: 10px;" onclick="checkTextPhishing()">Detect Phishing</button>

    <script>
        // Toggle between URL and Email modes based on URL parameter
        document.addEventListener("DOMContentLoaded", () => {
            const mode = new URLSearchParams(window.location.search).get('mode');
            if (mode === 'email') {
                document.getElementById("websiteSection").classList.add("hidden");
                document.getElementById("emailSection").classList.remove("hidden");
                document.getElementById("pageTitle").innerText = "SMS & Email Phishing Detector";
            }
        });

        // FUNCTION 1: Handles Website URL Checks
        function checkWebsite() {
            const urlValue = document.getElementById('urlInput').value;
            if (!urlValue) return alert("Please enter a URL.");

            let formattedUrl = urlValue.startsWith('http') ? urlValue : 'https://' + urlValue;

            fetch(`http://localhost:8080/api/phishing/check?url=${encodeURIComponent(formattedUrl)}`)
                .then(res => res.json())
                .then(data => {
                    const query = new URLSearchParams({
                        url: formattedUrl,
                        score: data.risk || 0,
                        level: data.level || "Low Risk"
                    });
                    window.location.href = `result.html?${query.toString()}`;
                })
                .catch(err => alert("Backend Error: Ensure Java and Python terminals are running."));
        }

        // FUNCTION 2: Handles SMS/Email Text Analysis (THIS WAS MISSING)
        function checkTextPhishing() {
            const textValue = document.getElementById('phishText').value;
            if (!textValue) return alert("Please paste some text to analyze.");

            // Calls your SmsPhishingController on Port 8080
            fetch(`http://localhost:8080/api/sms/check`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: textValue }) 
            })
            .then(res => {
                if (!res.ok) throw new Error("Backend not reachable");
                return res.json();
            })
            .then(data => {
                const query = new URLSearchParams({
                    url: "SMS Content Analysis",
                    score: data.risk || 0,
                    level: data.level || "Neutral"
                });
                window.location.href = `result.html?${query.toString()}`;
            })
            .catch(err => {
                console.error(err);
                alert("SMS Backend Error: Ensure your Java Bridge and Python ML are both running.");
            });
        }
    </script>
